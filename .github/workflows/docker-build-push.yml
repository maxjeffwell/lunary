name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_BACKEND: maxjeffwell/lunary-backend
  DOCKERHUB_FRONTEND: maxjeffwell/lunary-frontend
  GHCR_BACKEND: ghcr.io/maxjeffwell/lunary-backend
  GHCR_FRONTEND: ghcr.io/maxjeffwell/lunary-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            dockerfile: Dockerfile.backend
            dockerhub_env: DOCKERHUB_BACKEND
            ghcr_env: GHCR_BACKEND
          - service: frontend
            dockerfile: Dockerfile.frontend
            dockerhub_env: DOCKERHUB_FRONTEND
            ghcr_env: GHCR_FRONTEND
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Get Docker Hub credentials from Doppler
        id: doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "dockerhub_username=$(doppler secrets get DOCKERHUB_USERNAME --plain)" >> $GITHUB_OUTPUT
          echo "dockerhub_token=$(doppler secrets get DOCKERHUB_TOKEN --plain)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.doppler.outputs.dockerhub_username }}
          password: ${{ steps.doppler.outputs.dockerhub_token }}

      - name: Generate image tag
        id: image-tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG="${TIMESTAMP}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env[matrix.dockerhub_env] }}:${{ steps.image-tag.outputs.tag }}
            ${{ env[matrix.dockerhub_env] }}:latest
            ${{ env[matrix.ghcr_env] }}:${{ steps.image-tag.outputs.tag }}
            ${{ env[matrix.ghcr_env] }}:latest
          cache-from: type=registry,ref=${{ env[matrix.dockerhub_env] }}:buildcache
          cache-to: type=registry,ref=${{ env[matrix.dockerhub_env] }}:buildcache,mode=max

  trigger-k8s-deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Get deploy PAT from Doppler
        id: doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "deploy_pat=$(doppler secrets get GH_PAT_WORKFLOW_TRIGGER --plain)" >> $GITHUB_OUTPUT

      - name: Trigger K8s deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.doppler.outputs.deploy_pat }}
          repository: maxjeffwell/devops-portfolio-manager
          event-type: deploy-lunary
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "image_tag": "${{ needs.build-and-push.outputs.image-tag }}", "timestamp": "${{ needs.build-and-push.outputs.image-tag }}"}'
