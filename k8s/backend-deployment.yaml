apiVersion: apps/v1
kind: Deployment
metadata:
  name: lunary-backend
  namespace: lunary
  labels:
    app: lunary-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lunary-backend
  template:
    metadata:
      labels:
        app: lunary-backend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - vmi3115606
      containers:
        - name: backend
          image: maxjeffwell/lunary-backend:latest
          ports:
            - containerPort: 3333
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3333"
            - name: API_URL
              value: "https://lunary-api.el-jefe.me"
            - name: APP_URL
              value: "https://lunary.el-jefe.me"
            - name: SKIP_EMAIL_VERIFY
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lunary-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lunary-secrets
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
