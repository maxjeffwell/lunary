apiVersion: apps/v1
kind: Deployment
metadata:
  name: lunary-frontend
  namespace: lunary
  labels:
    app: lunary-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lunary-frontend
  template:
    metadata:
      labels:
        app: lunary-frontend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - vmi3115606
      containers:
        - name: frontend
          image: maxjeffwell/lunary-frontend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "https://lunary-api.el-jefe.me"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
